<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>LLM Chat</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        font-family: system-ui, Arial, sans-serif;
        display: flex;
        height: 100vh;
        background: #f0f2f5;
      }

      /* ── Sidebar ── */
      #sidebar {
        width: 260px;
        background: #1a1a2e;
        color: #cdd5e0;
        display: flex;
        flex-direction: column;
        flex-shrink: 0;
      }

      #sidebar h2 {
        font-size: .9rem;
        text-transform: uppercase;
        letter-spacing: .08em;
        padding: 1.2rem 1rem .6rem;
        color: #8892a4;
      }

      #new-conv-btn {
        margin: 0 .75rem .75rem;
        padding: .55rem .8rem;
        background: #0b93f6;
        color: #fff;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-size: .9rem;
        font-weight: 600;
      }
      #new-conv-btn:hover { background: #0a7fd4; }

      #conv-list {
        flex: 1;
        overflow-y: auto;
        padding: 0 .5rem;
      }

      .conv-item {
        padding: .55rem .75rem;
        border-radius: 8px;
        cursor: pointer;
        font-size: .88rem;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        color: #cdd5e0;
      }
      .conv-item:hover { background: #252540; }
      .conv-item.active { background: #0b93f6; color: #fff; }

      /* ── Main ── */
      #main {
        flex: 1;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }

      #chat {
        flex: 1;
        overflow-y: auto;
        padding: 1.5rem 1.5rem 1rem;
        display: flex;
        flex-direction: column;
        gap: .6rem;
      }

      #empty-state {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #888;
        font-size: 1rem;
      }

      .message { display: flex; flex-direction: column; }
      .message.user { align-items: flex-end; }
      .message.model { align-items: flex-start; }

      .bubble {
        max-width: 72%;
        padding: .65rem .9rem;
        border-radius: 14px;
        background: #fff;
        box-shadow: 0 1px 2px rgba(0,0,0,.08);
        line-height: 1.5;
        font-size: .95rem;
      }
      .message.user .bubble { background: #0b93f6; color: #fff; }

      .meta { font-size: .7rem; color: #999; margin-top: .2rem; }

      /* Markdown dentro del bubble */
      .bubble pre { background: #0d1117; color: #e6edf3; padding: .7rem; border-radius: 6px; overflow-x: auto; margin: .4rem 0; }
      .bubble code { background: #f0f2f5; padding: 2px 5px; border-radius: 4px; font-size: .88em; }
      .bubble pre code { background: transparent; padding: 0; }
      .bubble blockquote { border-left: 3px solid #ddd; padding-left: .7rem; color: #666; }
      .bubble p { margin: .3rem 0; }
      .bubble ul, .bubble ol { padding-left: 1.2rem; margin: .3rem 0; }

      /* ── Composer ── */
      #composer {
        padding: .75rem 1.5rem 1rem;
        background: #f0f2f5;
        display: flex;
        gap: .5rem;
      }
      #prompt {
        flex: 1;
        padding: .65rem .9rem;
        font-size: .95rem;
        border: 1px solid #d0d7de;
        border-radius: 10px;
        outline: none;
        background: #fff;
      }
      #prompt:focus { border-color: #0b93f6; }
      #send {
        padding: .65rem 1.1rem;
        background: #0b93f6;
        color: #fff;
        border: none;
        border-radius: 10px;
        font-size: .95rem;
        font-weight: 600;
        cursor: pointer;
      }
      #send:hover { background: #0a7fd4; }
      #send:disabled { background: #aac8e8; cursor: not-allowed; }
    </style>
  </head>
  <body>
    <aside id="sidebar">
      <h2>Conversaciones</h2>
      <button id="new-conv-btn">+ Nueva</button>
      <div id="conv-list"></div>
    </aside>

    <main id="main">
      <div id="chat">
        <div id="empty-state">Seleccioná o creá una conversación</div>
      </div>
      <form id="composer" onsubmit="return false;">
        <input id="prompt" type="text" placeholder="Escribe un mensaje..." autocomplete="off" disabled />
        <button id="send" disabled>Enviar</button>
      </form>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify/dist/purify.min.js"></script>
    <script src="/static/app.js"></script>
  </body>
</html>
